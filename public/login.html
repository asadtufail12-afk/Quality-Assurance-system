<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA System - Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 400px; }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 { color: #667eea; font-size: 1.8rem; }
    .logo p { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: #667eea; }
    .btn { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
    .btn:hover { background: #5568d3; }
    .error { color: red; font-size: 0.9rem; margin-bottom: 1rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>QA Diagnostics</h1>
      <p>Quality Assurance Management System</p>
    </div>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #666;">
      Default: admin / admin123
    </p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await res.json();
      if (data.success) {
        if (data.role === 'admin') window.location.href = '/admin';
        else window.location.href = '/diagnostic-center';
      } else {
        error.textContent = data.error;
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
